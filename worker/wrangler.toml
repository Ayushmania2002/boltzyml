name = "boltzyml-proxy"
main = "worker.js"
compatibility_date = "2025-01-01"

# Two Durable Objects, both free-plan compatible via the SQLite backend:
#   COUNTER       — a single global page-visit counter.
#   TEMPLATE_DO   — per-id template holder. Strongly consistent, so an uploaded
#                   template is readable globally the instant it is written. KV
#                   was eventually consistent and 404'd when the upload and
#                   Boltz's fetch hit different regions.
# Just deploy; the migrations create the classes automatically:
#   npx wrangler deploy
[[durable_objects.bindings]]
name = "COUNTER"
class_name = "Counter"

[[durable_objects.bindings]]
name = "TEMPLATE_DO"
class_name = "TemplateStore"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Counter"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TemplateStore"]
